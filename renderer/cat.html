<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;width:100%}
    body{
      background:transparent;
      overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
      font-family:ui-rounded,'SF Pro Rounded','Hiragino Maru Gothic ProN',system-ui,'Segoe UI',sans-serif;
    }

    #scene{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      width:100%;
      height:100%;
    }

    /* ── Speech bubble ── */
    #bubble{
      position:absolute;
      top:6px;
      left:50%;
      transform:translateX(-50%) translateY(-5px) scale(.97);
      background:var(--bub-bg,rgba(255,252,253,.93));
      backdrop-filter:blur(7px);
      -webkit-backdrop-filter:blur(7px);
      border:1.5px solid var(--bub-border,#f3d6e4);
      border-radius:21px;
      padding:10px 14px;
      font-size:11px;
      font-weight:500;
      letter-spacing:.1px;
      line-height:1.5;
      color:var(--bub-text,#6b5876);
      width:calc(100% - 14px);
      max-width:262px;
      text-align:center;
      box-shadow:0 9px 24px rgba(var(--bub-shadow,214,141,178),.28),0 2px 7px rgba(var(--bub-shadow,214,141,178),.18);
      opacity:0;
      transition:opacity .4s ease,transform .4s cubic-bezier(.2,.9,.3,1.25);
      pointer-events:none;
      z-index:20;
    }
    #bubble.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
    #bubble::after{
      content:'';position:absolute;
      bottom:-11px;left:50%;transform:translateX(-50%);
      border:7px solid transparent;border-top-color:var(--bub-border,#f3d6e4);
    }
    #bubble::before{
      content:var(--bub-heart,'♡');position:absolute;z-index:1;
      top:-9px;right:12px;
      font-size:13px;color:var(--bub-heart-color,#ffaecb);
      text-shadow:0 1px 2px rgba(var(--bub-shadow,214,141,178),.4);
    }

    /* ── Particles ── */
    #particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1}
    .particle{
      position:absolute;bottom:-24px;opacity:0;
      will-change:transform,opacity;animation:float-up linear forwards;
    }
    @keyframes float-up{
      0%  {opacity:0;  transform:translateY(0)      rotate(0deg)  scale(.6)}
      15% {opacity:.9}
      80% {opacity:.9}
      100%{opacity:0;  transform:translateY(-230px) rotate(40deg) scale(1)}
    }

    /* ── Cat shell ── */
    #cat-wrap{
      position:relative;z-index:2;width:84%;max-width:300px;
      cursor:grab;margin-bottom:8px;transition:filter 0.4s;
      filter:drop-shadow(0 6px 10px rgba(180,120,150,.22));
    }
    #cat-wrap:active{cursor:grabbing}
    /* explicit width REQUIRED: an SVG with only a viewBox collapses to 0×0 in flexbox */
    #cat-wrap svg{display:block;width:100%;height:auto;overflow:visible}

    /* ── Poses: only the .active one shows ── */
    .pose{display:none;transform-origin:60px 118px}
    .pose.active{display:block;animation:pose-fade .45s ease}
    @keyframes pose-fade{from{opacity:.15}to{opacity:1}}
    /* face the direction of travel while roaming */
    #cat-wrap.face-left{transform:scaleX(-1)}

    /* perk-up when it first notices you; side-eye when idle */
    @keyframes perk{0%{transform:scale(1)}40%{transform:scale(1.09)}100%{transform:scale(1)}}
    body.alert .pose.active{animation:perk .35s ease-in-out}
    @keyframes side-eye{0%,100%{transform:translateX(0) rotate(0)}30%,65%{transform:translateX(3px) rotate(1.5deg)}}
    body.glance .pose.active{animation:side-eye 1.4s ease-in-out}

    /* ── stand pose animations (id-based) ── */
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes wag{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(22deg)}}
    @keyframes leg-a{0%,100%{transform:rotate(0deg)}50%{transform:rotate(22deg)}}
    @keyframes leg-b{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-22deg)}}
    @keyframes ear-twitch{0%,88%,100%{transform:rotate(0deg)}91%{transform:rotate(-10deg)}95%{transform:rotate(6deg)}}
    @keyframes float-z{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(6px,-20px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes blush-pulse{0%,100%{opacity:.45}50%{opacity:.75}}

    #body-g{animation:bob 1.2s ease-in-out infinite;transform-origin:center bottom}
    #tail{animation:wag 1s ease-in-out infinite;transform-origin:8px 16px}
    #leg-fl{animation:leg-a .55s ease-in-out infinite;transform-origin:50% 0%}
    #leg-fr{animation:leg-b .55s ease-in-out infinite;transform-origin:50% 0%}
    #leg-bl{animation:leg-b .55s ease-in-out infinite;transform-origin:50% 0%}
    #leg-br{animation:leg-a .55s ease-in-out infinite;transform-origin:50% 0%}
    #ear-l{animation:ear-twitch 3.2s ease-in-out infinite;transform-origin:50% 100%}
    #ear-r{animation:ear-twitch 3.2s ease-in-out infinite .2s;transform-origin:50% 100%}
    .blush{animation:blush-pulse 2s ease-in-out infinite}

    /* stand emotion tweaks */
    body.e-sleep #leg-fl,body.e-sleep #leg-fr,body.e-sleep #leg-bl,body.e-sleep #leg-br,
    body.e-bored #leg-fl,body.e-bored #leg-fr,body.e-bored #leg-bl,body.e-bored #leg-br{animation:none}
    body.e-angry #body-g{animation:shake .18s ease-in-out 3}
    body.e-happy #body-g{animation:pop .4s ease-in-out 2,bob 1.2s ease-in-out infinite .8s}

    .face{display:none}
    .face.active{display:block}

    /* ── other-pose animations (class-based) ── */
    @keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
    .breathe{animation:breathe 3.2s ease-in-out infinite;transform-origin:center}
    .flop-breathe{animation:breathe 3.6s ease-in-out infinite;transform-origin:center}
    @keyframes play-move{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
    .play-move{animation:play-move 1.1s ease-in-out infinite;transform-origin:50px 112px}
    @keyframes paw-swat{0%,100%{transform:rotate(0)}30%{transform:rotate(-30deg)}60%{transform:rotate(10deg)}}
    .paw-swat{animation:paw-swat .7s ease-in-out infinite}
    @keyframes toy-roll{0%,100%{transform:translate(0,0)}50%{transform:translate(5px,-3px)}}
    .toy{animation:toy-roll .7s ease-in-out infinite}
    @keyframes tail-curl-flick{0%,100%{transform:rotate(0)}50%{transform:rotate(3deg)}}
    .tail-curl{animation:tail-curl-flick 3s ease-in-out infinite;transform-origin:88px 100px}

    /* ── Close btn ── */
    #close{
      position:absolute;top:6px;right:8px;width:20px;height:20px;
      background:rgba(0,0,0,.14);border:none;border-radius:50%;
      cursor:pointer;font-size:11px;color:#555;
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .2s;pointer-events:auto;
    }
    body:hover #close{opacity:1}
  </style>
</head>

        <ellipse class="blush" cx="22" cy="96" rx="6.5" ry="4" fill="#ffb7c5" opacity=".5"/>
        <ellipse class="blush" cx="46" cy="96" rx="6.5" ry="4" fill="#ffb7c5" opacity=".5"/>
        <path d="M18 90 Q24 87 30 90" fill="none" stroke="var(--eye)" stroke-width="2.6" stroke-linecap="round"/>
        <path d="M38 90 Q44 87 50 90" fill="none" stroke="var(--eye)" stroke-width="2.6" stroke-linecap="round"/>
        <path d="M32 96 L34.5 98.5 L37 96 Z" fill="var(--nose)"/>
        <text x="52" y="74" font-size="10" font-weight="bold" fill="#6c8ebf" style="animation:float-z 2s ease-out infinite">Z</text>
        <text x="58" y="64" font-size="8"  font-weight="bold" fill="#6c8ebf" style="animation:float-z 2s ease-out infinite .6s">Z</text>
        <text x="63" y="56" font-size="6"  font-weight="bold" fill="#6c8ebf" style="animation:float-z 2s ease-out infinite 1.2s">Z</text>
      </g></g>

    </svg>
  </div>
  <button id="close">✕</button>
</div>

<script>
// NOTE: window.api is a NON-configurable global (contextBridge). Do NOT declare a
// top-level `const api` — it throws "already declared" and kills this script.
const { getRoast } = (() => {
  // inline roast picker — kept in sync with src/service/roasts.js (source of truth)
  const R = {
    contextRot60:[
      "60 min in one chat. it forgot your first instruction 40 messages ago. context rot is crazy 💀",
      "an hour deep. minute-one you is dead to this model. new chat, bestie.",
      "this convo is cooked. attention's finite — restart it.",
    ],
    contextRot90:[
      "90 min, one context. it's hallucinating its own code now 💀",
      "hour and a half. the middle of this chat is /dev/null. it forgot.",
      "the model's got no object permanence at this length. fresh chat. now.",
    ],
    contextRot120:[
      "2 hours, one chat. the context window is a landfill 🗑️ new session.",
      "outputs getting weird? that's not the model, that's the rot. restart.",
      "2hr session. it's guessing AND gaslighting you. close it.",
    ],
    cogWall:[
      "90 min locked in. brain cache full. 5 min break = hard refresh.",
      "you hit the focus wall. not dumb, just full. go touch grass 🌱",
      "working memory at 100%. you'll catch the bug after a break, not before.",
    ],
    errorLoop:[
      "same error, 3rd time. the AI's got nothing new. you do. read it 🔍",
      "pasting the traceback again is not a personality. find the line.",
      "this error is giving 'you didn't actually read it'. it has a root cause.",
    ],
    panicPrompt:[
      "4 prompts in a minute. you're mashing the vending machine 💀",
      "slow down bestie. spam ≠ speed. one good prompt > four panicked ones.",
      "rapid-firing just feeds it noise. breathe, then prompt.",
    ],
    noContext:[
      "'fix this' with no error? it'll guess. confidently. wrongly.",
      "debugging by vibes. give it symptoms or get fan-fiction.",
      "what you expected, what happened, where. you gave it none of that 💀",
    ],
    postOutput:[
      "huge output, zero questions. you ARE the code review. read it.",
      "you accepted that wall of code raw. that's a prod incident loading 🫡",
      "it doesn't catch its own edge cases. that part's literally your job.",
    ],
    weekendOverwork:[
      "2hr grind on a weekend. you're borrowing from monday-you. they're livid.",
      "recovery isn't optional, it's the patch notes. log off 🌱",
      "the repo survives without you for a day. main character moment: rest.",
    ],
    midnight:[
      "past midnight coding = reasoning at 0.05 BAC. your reviewers are sober 💀",
      "2am brain doesn't catch bugs, it ships them. go to sleep.",
      "midnight bugs take 3x longer to find tomorrow. log off, bestie.",
    ],
    eyeRest:[
      "20-20-20, babe: look 20ft away for 20s. your eyeballs are cooked 👀",
      "when did you last blink? do it. now. for me.",
      "screen's been in your face 25 min. look at something far away 👀",
    ],
    noBreak:[
      "50 min without moving. your spine filed a complaint 🦴 stand up.",
      "you're fused to that chair. stretch, bestie.",
      "no break in nearly an hour. go touch grass, or at least the kitchen 🌱",
    ],
    longDay:[
      "8 hours active today. that's a full shift. clock out 🫡",
      "you've done a whole workday. past this it's for the plot, not the PR.",
      "8h in. you're not building anymore, you're grinding. log off.",
    ],
    dayStreak:[
      "7 days straight. even God rested 🙏 take a day off.",
      "a full week, no day off. that's not dedication, it's a burnout speedrun.",
      "7-day streak. impressive. also: stop. rest is a feature, not a bug.",
    ],
  };
  const pick = a => a[Math.floor(Math.random()*a.length)];
  return { getRoast: (trigger) => R[trigger] ? pick(R[trigger]) : null };
})();

// ── State ──
let cat = { color:'orange', size:'medium', name:'Roast Cat', enabled:true };
let isDragging = false, dragX = 0, dragY = 0, hasDragged = false;

const COLORS = {
  orange: { body:'#f4a261', tummy:'#fff3e0', ear:'#ffb7c5', accent:'#e07b39', eye:'#1a1a2e', nose:'#ff6b9d' },
  black:  { body:'#2d2d2d', tummy:'#4a4a4a', ear:'#ff69b4', accent:'#111',    eye:'#fff',    nose:'#ff6b9d' },
  white:  { body:'#f0f0f0', tummy:'#ffffff', ear:'#ffb7c5', accent:'#ccc',    eye:'#1a1a2e', nose:'#ff6b9d' },
  grey:   { body:'#9e9e9e', tummy:'#e0e0e0', ear:'#ffb7c5', accent:'#757575', eye:'#1a1a2e', nose:'#ff6b9d' },
  pink:   { body:'#ff9eb5', tummy:'#ffd6e0', ear:'#ff6b9d', accent:'#e91e8c', eye:'#1a1a2e', nose:'#9c27b0' },
};

const EMOTION_MAP = {
  idle:'idle', happy:'happy', angry:'angry', shocked:'shocked',
  bored:'bored', smug:'smug', sleep:'sleep',
};

// how each mood carries itself: pose to approach in, pose to roast in, pose to leave in
const MOOD_BODY = {
  angry:   { approach:'stand', roastPose:'stand', exit:'loaf', perkMs:200 },
  shocked: { approach:'stand', roastPose:'stand', exit:'sit',  perkMs:250 },
  smug:    { approach:'sit',   roastPose:'stand', exit:'sit',  perkMs:600 },
  bored:   { approach:'loaf',  roastPose:'loaf',  exit:'loaf', perkMs:700 },
  sleep:   { approach:'flop',  roastPose:'flop',  exit:'flop', perkMs:850 },
  happy:   { approach:'play',  roastPose:'stand', exit:'play', perkMs:300 },
  idle:    { approach:'stand', roastPose:'stand', exit:'sit',  perkMs:400 },
};

// ── DOM ──
const bubble    = document.getElementById('bubble');
const wrap      = document.getElementById('cat-wrap');
const particles = document.getElementById('particles');
const root      = document.documentElement;

function applyColor(scheme) {
  const c = COLORS[scheme] || COLORS.orange;
  for (const k of ['body','tummy','ear','accent','eye','nose']) root.style.setProperty('--'+k, c[k]);
}

// ── Poses ──
const POSES = ['stand','loaf','sit','play','flop'];
let currentPose = 'stand';
function setPose(name) {
  if (!POSES.includes(name)) name = 'stand';
  currentPose = name;
  document.querySelectorAll('.pose').forEach(p => p.classList.toggle('active', p.dataset.pose === name));
}

// ── Emotions (face swap on the stand pose) ──
function setEmotion(name) {
  const e = EMOTION_MAP[name] || 'idle';
  [...document.body.classList].forEach(c => { if (c.startsWith('e-')) document.body.classList.remove(c); });
  document.body.classList.add('e-' + e);
  document.querySelectorAll('.face').forEach(f => f.classList.remove('active'));
  const face = document.getElementById('face-' + e);
  if (face) face.classList.add('active');
}

// ── Bubble ──
let bubbleTimer = null;
function showBubble(text, durationMs = 7000) {
  bubble.textContent = text;
  bubble.classList.add('show');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => bubble.classList.remove('show'), durationMs);
}

// ── Chat themes (kept in sync with settings.html / onboarding.html) ──
const THEMES = {
  pink:   { bubbleBg:'rgba(255,252,253,.93)', bubbleBorder:'#f3d6e4', bubbleText:'#6b5876', bubbleShadow:'214,141,178', heart:'♡', heartColor:'#ffaecb', particles:['🎀','💗','✨','🤍','🌸','⭐','🩰'] },
  demure: { bubbleBg:'rgba(252,251,253,.95)', bubbleBorder:'#e6e0ee', bubbleText:'#6d6477', bubbleShadow:'170,160,190', heart:'❀', heartColor:'#cdbfe0', particles:['🤍','✨','🌙','🕊️','🎀','🪞'] },
  catchy: { bubbleBg:'rgba(34,18,40,.92)',    bubbleBorder:'#ff2d78', bubbleText:'#ffe6f1', bubbleShadow:'255,45,120',  heart:'★', heartColor:'#ffd23f', particles:['💥','⚡','🔥','💖','🤩','✨','😼'] },
  mint:   { bubbleBg:'rgba(248,255,253,.93)', bubbleBorder:'#bfe9da', bubbleText:'#3f6b5c', bubbleShadow:'120,200,170', heart:'♡', heartColor:'#7fd6b5', particles:['🍃','✨','🫧','🌿','🤍','⭐'] },
};
function applyTheme(name) {
  const t = THEMES[name] || THEMES.pink;
  root.style.setProperty('--bub-bg', t.bubbleBg);
  root.style.setProperty('--bub-border', t.bubbleBorder);
  root.style.setProperty('--bub-text', t.bubbleText);
  root.style.setProperty('--bub-shadow', t.bubbleShadow);
  root.style.setProperty('--bub-heart', '"' + t.heart + '"');
  root.style.setProperty('--bub-heart-color', t.heartColor);
  AMBIENT = t.particles;
}

// ── Particles ──
let AMBIENT = THEMES.pink.particles;
const MOOD_FX = {
  angry:['💢','😤','🔥'], shocked:['❗','😳','⁉️'], smug:['😼','💅','✨'],
  bored:['😒','🥱','💤'], sleep:['😴','💤'], happy:['💗','✨','🎀','🥹'], idle:['✨','🩷'],
};
function makeParticle(char, fast) {
  const p = document.createElement('span');
  p.className = 'particle';
  p.textContent = char;
  p.style.left = (12 + Math.random() * 70) + '%';
  p.style.fontSize = (12 + Math.random() * 9) + 'px';
  const dur = (fast ? 3 : 4) + Math.random() * (fast ? 2 : 3);
  p.style.animationDuration = dur + 's';
  particles.appendChild(p);
  setTimeout(() => p.remove(), dur * 1000 + 200);
}
function spawnAmbient() {
  if (document.hidden) return;
  makeParticle(AMBIENT[Math.floor(Math.random() * AMBIENT.length)], false);
}
function spawnParticles(e) {
  const set = MOOD_FX[e] || MOOD_FX.idle;
  for (let i = 0; i < 6; i++) setTimeout(() => makeParticle(set[Math.floor(Math.random() * set.length)], true), i * 120);
}
setInterval(spawnAmbient, 1100);

// ── Autonomous life ──
// Idle = settle into a resting animation IN PLACE (loaf/sit). We never swap to
// off-centre poses at random, so the cat never appears to "teleport".
// Free-roam = occasionally take a SMOOTH animated walk (main clamps to screen).
let lifeTimer = null, glanceTimer = null, roasting = false, roastSeq = 0, walking = false;
let mode = 'free'; // 'free' (zoomies) | 'static' (couch potato) — from cat.roam
let behavior = { activity: 60, quiet: false, sound: false }; // from app prefs
let restRuns = 0; // consecutive rest cycles → doze off after a long lull

function restPose() { return Math.random() < 0.72 ? 'loaf' : 'sit'; }
// higher activity → shorter waits (more moving/cute moments). 0→1.6×, 60→1.0×, 100→0.6×
function lifeFactor() { return Math.max(0.5, 1.6 - (behavior.activity || 60) / 100); }

function scheduleLife() {
  clearTimeout(lifeTimer);
  if (roasting) { lifeTimer = setTimeout(scheduleLife, 2500); return; }

  // couch potato OR quiet/focus mode: just loaf in place, never roam
  if (mode === 'static' || behavior.quiet) {
    setPose(restPose());
    lifeTimer = setTimeout(scheduleLife, 20000 + Math.random() * 16000);
    return;
  }

  const f = lifeFactor();

  // long lull → climb into a nap (doze)
  if (restRuns >= 4) {
    restRuns = 0;
    setPose('flop');
    lifeTimer = setTimeout(scheduleLife, (16000 + Math.random() * 14000) * f);
    return;
  }

  const r = Math.random();              // free roam
  if (r < 0.50) {                       // rest in place
    restRuns++;
    setPose(restPose());
    lifeTimer = setTimeout(scheduleLife, (12000 + Math.random() * 14000) * f);
  } else if (r < 0.72) {                // a short stroll
    restRuns = 0;
    takeAWalk(() => { lifeTimer = setTimeout(scheduleLife, (9000 + Math.random() * 12000) * f); });
  } else if (r < 0.86) {                // wander to a screen edge and perch there
    restRuns = 0;
    takeAWalk(() => { lifeTimer = setTimeout(scheduleLife, (10000 + Math.random() * 12000) * f); }, true);
  } else {                              // be adorable
    restRuns = 0;
    setPose('play');
    lifeTimer = setTimeout(scheduleLife, (6000 + Math.random() * 6000) * f);
  }
}

// Smooth, animated stroll — NEVER a teleport. Main clamps it inside the screen.
function takeAWalk(done, toEdge) {
  if (roasting || behavior.quiet || mode === 'static') { done(); return; }
  walking = true;
  setPose('stand');                    // legs-walking animation
  // toEdge = a long, committed walk in one direction → main clamps it at the
  // screen edge, so the cat ends up perched against an edge.
  const steps = toEdge ? (90 + Math.floor(Math.random() * 70)) : (26 + Math.floor(Math.random() * 34));
  const dirX = (Math.random() < 0.5 ? -1 : 1) * (toEdge ? 2.3 : (1.1 + Math.random() * 1.6));
  const dirY = toEdge ? 0 : (Math.random() - 0.5) * 1.0;
  wrap.classList.toggle('face-left', dirX < 0);
  let i = 0;
  (function step() {
    if (roasting || i >= steps) {
      walking = false;
      wrap.classList.remove('face-left');
      if (!roasting) setPose(restPose());
      done();
      return;
    }
    window.api.moveWindow(dirX, dirY);
    i++;
    setTimeout(step, 28);              // ~36fps glide
  })();
}

function scheduleGlance() {
  clearTimeout(glanceTimer);
  const w = 14000 + Math.random() * 18000; // every 14–32s
  glanceTimer = setTimeout(() => {
    if (!roasting && !walking) {
      document.body.classList.add('glance');
      setTimeout(() => document.body.classList.remove('glance'), 1400);
    }
    scheduleGlance();
  }, w);
}

// ── Sound (synthesised, no asset files; off by default via prefs) ──
let actx = null;
function audioCtx() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch {} }
  if (actx && actx.state === 'suspended') actx.resume();
  return actx;
}
function blip(freq, dur, when, type, gain) {
  const a = audioCtx(); if (!a) return;
  const t = a.currentTime + (when || 0);
  const o = a.createOscillator(), g = a.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain || 0.05, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + dur + 0.03);
}
function playSound(kind) {
  if (!behavior.sound) return;
  if (kind === 'pet') { blip(620, 0.12, 0, 'sine', 0.05); blip(820, 0.13, 0.1, 'sine', 0.045); } // soft chirp
  else { blip(520, 0.15, 0, 'triangle', 0.05); blip(430, 0.22, 0.13, 'triangle', 0.05); }        // little meow
}

// ── Pet (click) — coherent happy reaction from a local, mood-keyed bank ──
const PET_MSGS = {
  content: ['purrrr 🩷','ok that\'s the spot','mrrp','*headbonk*','you may pet me. once more.','♡','i tolerate you (affectionate)'],
  sleepy:  ['five more minutes…','zzz… oh, hi','too cozy to move rn','*sleepy blink* 🩷'],
  playful: ['again! again!','catch me 😼','ooh, the hand','let\'s gooo ✨'],
  bored:   ['finally, attention','entertain me','i was THIS close to chaos','oh NOW you pet me'],
};
let petCooldownUntil = 0;
function petMood() {
  const h = new Date().getHours();
  if (h >= 0 && h < 6) return 'sleepy';
  if (currentPose === 'play') return 'playful';
  return 'content';
}
function pet() {
  if (!cat.enabled) return;
  const now = Date.now();
  // coherent: a pet is always a HAPPY reaction — perk into the emotive pose so the
  // happy ^.^ face actually shows (it only exists on the stand pose), + text agree.
  setPose('stand');
  setEmotion('happy');
  document.body.classList.add('alert');
  setTimeout(() => document.body.classList.remove('alert'), 350);
  if (now < petCooldownUntil) return;  // rapid clicks: keep purring, don't spam text
  petCooldownUntil = now + 1600;
  playSound('pet');
  const pool = PET_MSGS[petMood()] || PET_MSGS.content;
  showBubble(pool[Math.floor(Math.random() * pool.length)], 4000);
  setTimeout(() => { if (!roasting) { setEmotion('idle'); } }, 4300);
}

// ── Roast with full body language ──
const wait = ms => new Promise(r => setTimeout(r, ms));

async function doRoast(trigger, emotion) {
  if (!cat.enabled) return;
  const text = getRoast(trigger);
  if (!text) return; // no roast without a reason
  const e = emotion || 'smug';
  const body = MOOD_BODY[e] || MOOD_BODY.idle;
  const myId = ++roastSeq;
  roasting = true;
  clearTimeout(lifeTimer);

  // 1. notice you
  document.body.classList.remove('glance');
  document.body.classList.add('alert');
  setPose(body.approach);
  if (body.approach === 'stand') setEmotion(e === 'angry' ? 'angry' : 'idle');
  await wait(body.perkMs);
  if (myId !== roastSeq) return;
  document.body.classList.remove('alert');

  // 2. roast with attitude
  setPose(body.roastPose);
  if (body.roastPose === 'stand') setEmotion(e);
  showBubble(text, 9000);
  spawnParticles(e);
  playSound('roast');
  await wait(9200);
  if (myId !== roastSeq) return;

  // 3. lose interest, go back to its own life
  setPose(body.exit);
  if (body.exit === 'stand') setEmotion('idle');
  roasting = false;
  scheduleLife();
}

// ── IPC ──
window.api.onInit(config => {
  cat = config;
  applyColor(cat.color);
  mode = (cat.roam === 'static') ? 'static' : 'free';
  scheduleLife(); // re-settle when movement mode changes
});

// Manual "roast me" (click / tray). Only assert things that are actually true
// right now — never lie about the clock (no "it's 2am" at 5pm). Habit roasts are
// fair game on demand; time/day-specific ones only when the clock agrees.
const MANUAL_BASE = [
  ['errorLoop','angry'], ['noContext','bored'], ['postOutput','smug'], ['panicPrompt','shocked'],
];
function manualRoast() {
  const now = new Date();
  const pool = MANUAL_BASE.slice();
  const h = now.getHours();
  if (h >= 0 && h < 4)         pool.push(['midnight','sleep']);       // text says "past midnight / 2am" — only 0–4h
  const d = now.getDay();
  if (d === 0 || d === 6)      pool.push(['weekendOverwork','bored']); // only on weekends
  const [t, e] = pool[Math.floor(Math.random() * pool.length)];
  doRoast(t, e);
}
window.api.onRoast(manualRoast);
window.api.onContext(({ trigger, emotion }) => doRoast(trigger, emotion));
window.api.onTheme(applyTheme);
window.api.onBehavior(b => { behavior = { ...behavior, ...b }; scheduleLife(); });

// ── Drag ──
wrap.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging = true; hasDragged = false;
  dragX = e.screenX; dragY = e.screenY;
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.screenX - dragX, dy = e.screenY - dragY;
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) hasDragged = true;
  window.api.moveWindow(dx, dy);
  dragX = e.screenX; dragY = e.screenY;
});
document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  if (!hasDragged) pet(); // a click = pet the cat (drag = move it). roasts come from real triggers.
});

// ── Close ──
document.getElementById('close').addEventListener('click', () => window.close());

// ── Boot: start its little life ──
applyTheme('pink'); // overridden by the 'theme' IPC message from main
setEmotion('idle');
setPose('loaf');
scheduleLife();
scheduleGlance();
</script>
</body>
</html>
