name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check all source files exist
        run: |
          for f in main.js preload.js monitor.js roasts.js cat.html settings.html; do
            [ -f "$f" ] || (echo "Missing: $f" && exit 1)
          done
          echo "All source files present."
